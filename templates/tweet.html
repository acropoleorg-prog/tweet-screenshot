<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .tweet-card {
      width: 598px;
      background: #ffffff;
      border: 1px solid #e1e8ed;
      border-radius: 16px;
      padding: 20px 20px 16px 20px;
      position: relative;
    }

    /* Header */
    .tweet-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .tweet-author {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #e1e8ed;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }

    .author-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .author-name {
      font-size: 15px;
      font-weight: 700;
      color: #0f1419;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
    }

    .verified-badge svg {
      width: 18px;
      height: 18px;
    }

    .author-handle {
      font-size: 14px;
      color: #536471;
      line-height: 1.3;
    }

    .x-logo {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .x-logo svg {
      width: 22px;
      height: 22px;
      fill: #0f1419;
    }

    /* Body */
    .tweet-text {
      font-size: 16px;
      line-height: 1.55;
      color: #0f1419;
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tweet-text a {
      color: #1d9bf0;
      text-decoration: none;
    }

    /* Media */
    .tweet-media {
      margin-bottom: 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e1e8ed;
    }

    .tweet-media img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 400px;
      object-fit: cover;
    }

    /* Footer */
    .tweet-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid #eff3f4;
    }

    .tweet-date {
      font-size: 14px;
      color: #536471;
    }

    .tweet-stats {
      display: flex;
      gap: 16px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #536471;
    }

    .stat svg {
      width: 16px;
      height: 16px;
      fill: #536471;
    }
  </style>
</head>
<body>
  <div class="tweet-card" id="tweet">

    <div class="tweet-header">
      <div class="tweet-author">
        <div class="avatar">
          {{#if avatarUrl}}
          <img src="{{avatarUrl}}" alt="avatar" />
          {{else}}
          <div class="avatar-placeholder">{{avatarInitial}}</div>
          {{/if}}
        </div>
        <div class="author-info">
          <div class="author-name">
            {{authorName}}
            {{#if verified}}
            <span class="verified-badge">
              <svg viewBox="0 0 24 24" aria-label="Verified account">
                <g>
                  <path fill="#1d9bf0" d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z"/>
                </g>
              </svg>
            </span>
            {{/if}}
          </div>
          <div class="author-handle">@{{authorHandle}}</div>
        </div>
      </div>

      <div class="x-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>
    </div>

    <div class="tweet-text">{{tweetText}}</div>

    {{#if mediaUrl}}
    <div class="tweet-media">
      <img src="{{mediaUrl}}" alt="Tweet media" />
    </div>
    {{/if}}

    <div class="tweet-footer">
      <span class="tweet-date">{{tweetDate}}</span>
      <div class="tweet-stats">
        <span class="stat">
          <svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 7.498 3.858 6.247 8.12l-1.558 5.502c-.865 3.055-5.601 3.886-7.671 1.35l-.1-.127c-.637-.8-1.887-.787-2.505.024l-.515.662c-1.78 2.287-5.969 1.218-6.038-1.664l-.231-5.867z"/></svg>
          {{replyCount}}
        </span>
        <span class="stat">
          <svg viewBox="0 0 24 24"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"/></svg>
          {{retweetCount}}
        </span>
        <span class="stat">
          <svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"/></svg>
          {{likeCount}}
        </span>
      </div>
    </div>

  </div>
</body>
</html>
